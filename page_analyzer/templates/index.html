<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Analizador de Páginas</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Analizador de Páginas</a>
            <div class="navbar-nav">
                <a class="nav-link" href="{{ url_for('list_urls') }}">Sitios</a>
            </div>
        </div>
    </nav>

    {% for message in get_flashed_messages() %}
        <div class="alert alert-info">{{ message }}</div>
    {% endfor %}

    <div class="container mt-5">
        <h1>Analizador de Páginas</h1>
        <p>Verifica el estado SEO de una página web</p>

        <form action="{{ url_for('add_url') }}" method="POST" class="mt-4">
            <div class="mb-3">
                <input
                    type="text"
                    name="url"
                    class="form-control"
                    placeholder="https://www.ejemplo.com"
                    required>
            </div>
            <button type="submit" class="btn btn-primary">Verificar</button>
        </form>
    </div>

</body>
</html>
