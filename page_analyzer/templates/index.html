<!DOCTYPE html>
<html lang="es" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Page Analyzer</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column h-100 bg-light">

    <!-- Barra de Navegación -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">Page Analyzer</a>
            <button class="navbar-toggler" type="text/brand" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-menu navbar-nav ms-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/">Inicio</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Contenido Principal -->
    <main class="flex-shrink-0 my-5">
        <div class="container-lg">
            <div class="row">
                <div class="col-12 col-md-10 col-lg-8 mx-auto text-center">
                    <h1 class="display-3 fw-bold mb-3">Analizador de Páginas</h1>
                    <p class="lead text-muted mb-4">Verifica páginas web de forma gratuita para comprobar su estado de optimización SEO.</p>

                    <!-- Formulario de Análisis -->
                    <form action="/urls" method="POST" class="d-flex flex-column flex-sm-row gap-2 justify-content-center">
                        <input type="url" name="url" class="form-control form-control-lg" placeholder="https://example.com" required>
                        <button type="submit" class="btn btn-primary btn-lg px-4 text-nowrap">Analizar</button>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Pie de Página -->
    <footer class="footer mt-auto py-3 bg-dark text-light border-top border-secondary">
        <div class="container text-center">
            <span class="text-muted">&copy; 2026 Page Analyzer Project</span>
        </div>
    </footer>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
