<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de URLs</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">Analizador de Páginas</a>
            <div class="navbar-nav">
                <a class="nav-link active" href="/urls">Sitios</a>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <h1>Lista de URLs guardadas</h1>

        <table data-test="urls" class="table table-bordered mt-4">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Último chequeo</th>
                    <th>Código de Estado</th>
                </tr>
            </thead>
            <tbody>
                {% for url in urls %}
                <tr>
                    <td>{{ url[0] }}</td>
                    <td>
                        <a href="/urls/{{ url[0] }}">{{ url[1] }}</a>
                    </td>
                    <td>{{ url[2] or '' }}</td>
                    <td>{{ url[3] or '' }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>

        <br>
        <a href="/" class="btn btn-secondary">Volver al inicio</a>
    </div>

</body>
</html>
