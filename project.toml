[tool.poetry]
name = "hexlet-code"
version = "0.1.0"
description = "Analizador de páginas web - Proyecto de aprendizaje"
authors = [Manuel Parada]
packages = [{include = "page_analyzer"}]

[tool.poetry.dependencies]
python = "^3.10"
flask = "`3.0.0"
gunicorn = "^21.2.0"
python-dotenv = "1.0.0"
request = "2.31.0"
beautifulsoup4 = "^4.12.0"
pydantic = "^2.6.0"

[build-system]
requires = ["poetry-core"]
build-backend = "poetry.core.masonry.api"
